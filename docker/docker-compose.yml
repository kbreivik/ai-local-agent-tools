# HP1 AI Agent — production services
# Start with: docker compose -f docker/docker-compose.yml up -d
# Dev with local postgres: docker compose -f docker/docker-compose.yml --profile dev up -d
#
# Naming conventions:
#   Container names: hp1_<name> (underscore) for compose services
#   Volumes:         <name>-data (hyphen) — Docker convention
#   Networks:        <name>-net (hyphen) — Docker convention
#   Env vars:        UPPER_CASE_UNDERSCORE

networks:
  agent-net:
    driver: bridge
  # Ansible-managed bridge shared with hp1-postgres (created by postgres role).
  # External so Compose doesn't own it — Ansible creates it via postgres role.
  hp1-pg-net:
    external: true

volumes:
  hp1-pgdata:        # postgres dev volume (profile: dev only)
  hp1-pgadmin:       # pgadmin dev volume  (profile: pgadmin only)
  muninndb-data:
    external: true
  agent-data:
  agent-logs:

services:
  # ── Dev-only PostgreSQL ───────────────────────────────────────────────────────
  # Production uses Ansible-managed hp1-postgres on hp1-pg-net (port 5433).
  # This service exists for local development only (no Ansible required).
  # Start with: --profile dev
  postgres:
    image: postgres:16-alpine
    container_name: hp1_postgres
    restart: unless-stopped
    profiles: ["dev"]
    networks:
      - agent-net
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-hp1_agent}
      POSTGRES_USER:     ${POSTGRES_USER:-hp1user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hp1pass}
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - hp1-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hp1user} -d ${POSTGRES_DB:-hp1_agent}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: hp1_pgadmin
    restart: unless-stopped
    networks:
      - agent-net
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL:    ${PGADMIN_EMAIL:-admin@hp1.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - hp1-pgadmin:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
        required: false
    profiles:
      - pgadmin

  muninndb:
    image: ghcr.io/scrypster/muninndb:latest
    container_name: muninndb
    restart: unless-stopped
    networks:
      - agent-net
    volumes:
      - muninndb-data:/data
    environment:
      MUNINNDB_DATA: /data
    entrypoint: ["sh", "-c"]
    command: ["muninndb-server --daemon --data /data && tail -f /dev/null"]
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -sf 'http://127.0.0.1:8475/api/engrams?q=ping' > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  muninndb-proxy:
    image: alpine/socat:latest
    container_name: muninndb-proxy
    network_mode: "service:muninndb"
    command: TCP-LISTEN:9475,bind=0.0.0.0,reuseaddr,fork TCP:127.0.0.1:8475
    depends_on:
      muninndb:
        condition: service_healthy
    restart: unless-stopped

  hp1_agent:
    image: ${HP1_IMAGE:-ghcr.io/kbreivik/hp1-ai-agent:latest}
    container_name: hp1_agent
    restart: unless-stopped
    networks:
      - agent-net
      # hp1-pg-net: shared bridge with Ansible-managed hp1-postgres container.
      # Allows DATABASE_URL=@hp1-postgres:5432 to resolve.
      # Created by Ansible postgres role; must exist before compose up.
      - hp1-pg-net
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # agent-01 is not in the Swarm — manage manager-01 via Docker TCP API.
      # Override here so it applies even if not set in .env.
      # Port 2375 = plain TCP (ensure dockerd on manager-01 has -H tcp://0.0.0.0:2375).
      - DOCKER_HOST=${DOCKER_HOST:-tcp://192.168.199.21:2375}
      # AGENT01_DOCKER_HOST is the LOCAL socket used only by DockerAgent01Collector to list
      # agent-01's own containers. Kept separate so DOCKER_HOST can still target manager-01.
      - AGENT01_DOCKER_HOST=unix:///var/run/docker.sock
    # Runtime Docker socket GID — added as supplemental group so the agent user can
    # access /var/run/docker.sock without baking the GID into the image at build time.
    # DOCKER_GID is read from .env (set by Ansible from stat /var/run/docker.sock).
    group_add:
      - "${DOCKER_GID:-994}"
    volumes:
      # Local socket mounted read-only so DockerAgent01Collector can list agent-01's containers.
      # DOCKER_HOST still points to manager-01 for Swarm tools — these are separate connections.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - agent-data:/app/data
      - agent-logs:/app/logs
    depends_on:
      muninndb:
        condition: service_healthy
      postgres:
        condition: service_healthy
        required: false    # dev profile only; production uses hp1-postgres on hp1-pg-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
