name: Build & Push

on:
  push:
    branches: [main, 'v2/**']
    tags: ['v*']
    # Skip builds for commits that ONLY touch the prompt queue bookkeeping
    # (DONE-mark chore commits from run_queue.sh). These commits contain the
    # same source tree as the preceding code commit — rebuilding produces an
    # identical image. Skipping avoids the cancel-in-progress churn.
    #
    # Note: paths-ignore ONLY skips if every changed path in the commit
    # matches. Commits that touch cc_prompts/ AND anything else still run.
    paths-ignore:
      - 'cc_prompts/**'
      - '*.md'
      - 'docs/**'

# Cancel in-progress builds on the same branch — only the latest commit's
# build pushes :latest, preventing older commits from overwriting it.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/kbreivik/hp1-ai-agent
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Read VERSION
        id: version
        run: echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Set image tag
        id: tag
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          VERSION=$(cat VERSION)
          BUILD_NUM=${{ github.run_number }}
          echo "image_tag=${{ env.IMAGE_NAME }}:${VERSION}-${BUILD_NUM}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "version_tag=${{ env.IMAGE_NAME }}:${VERSION}" >> $GITHUB_OUTPUT
          echo "latest_tag=${{ env.IMAGE_NAME }}:latest" >> $GITHUB_OUTPUT

      - name: Sync package.json + lockfile version
        working-directory: gui
        run: |
          VER="$(cat ../VERSION)"
          # npm version updates BOTH package.json and package-lock.json atomically.
          # --no-git-tag-version prevents it from making a commit/tag.
          # --allow-same-version lets it succeed if already at target (idempotent).
          npm version --no-git-tag-version --allow-same-version "$VER"

      - name: Generate build_info.json
        run: python scripts/gen_build_info.py

      - name: Log in to GHCR
        uses: docker/login-action@v3.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ steps.tag.outputs.image_tag }}
            ${{ steps.tag.outputs.version_tag }}
            ${{ steps.tag.outputs.latest_tag }}
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

      - name: Output image tag
        id: output
        run: echo "image_tag=${{ steps.tag.outputs.image_tag }}" >> $GITHUB_OUTPUT
