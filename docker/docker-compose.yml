version: "3.8"

# HP1 AI Agent — local services
# Start with: docker compose -f docker/docker-compose.yml up -d

networks:
  agent-net:
    driver: bridge

volumes:
  hp1_pgdata:
  hp1_pgadmin:
  muninndb-data:
    external: true

services:
  postgres:
    image: postgres:16-alpine
    container_name: hp1_postgres
    restart: unless-stopped
    networks:
      - agent-net
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-hp1_agent}
      POSTGRES_USER:     ${POSTGRES_USER:-hp1user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hp1pass}
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - hp1_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hp1user} -d ${POSTGRES_DB:-hp1_agent}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: hp1_pgadmin
    restart: unless-stopped
    networks:
      - agent-net
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL:    ${PGADMIN_EMAIL:-admin@hp1.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - hp1_pgadmin:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - pgadmin

  muninndb:
    image: ghcr.io/scrypster/muninndb:latest
    container_name: muninndb
    restart: unless-stopped
    networks:
      - agent-net
    volumes:
      - muninndb-data:/data
    environment:
      MUNINNDB_DATA: /data
    entrypoint: ["sh", "-c"]
    command: ["muninndb-server --daemon --data /data && tail -f /dev/null"]
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -sf 'http://127.0.0.1:8475/api/engrams?q=ping' > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  muninndb-proxy:
    image: alpine/socat:latest
    container_name: muninndb-proxy
    network_mode: "service:muninndb"
    command: TCP-LISTEN:9475,bind=0.0.0.0,reuseaddr,fork TCP:127.0.0.1:8475
    depends_on:
      muninndb:
        condition: service_healthy
    restart: unless-stopped
