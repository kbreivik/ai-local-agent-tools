name: Sensors

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: sensors-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  sensors:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: gui/package-lock.json

      - name: Install Python sensors
        run: pip install --quiet ruff bandit mypy

      - name: Install gitleaks
        run: |
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Install gui deps (for ESLint sensor)
        working-directory: gui
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Run sensor stack (full output)
        id: check
        run: make check
        continue-on-error: true

      - name: Run agent-formatted sensor output (for PR comment)
        id: check_agent
        if: always()
        run: |
          set +e
          python scripts/check_sensors.py > sensor_report.txt 2>&1
          echo "exit_code=$?" >> $GITHUB_OUTPUT
          set -e
          {
            echo "report<<__EOF__"
            cat sensor_report.txt
            echo "__EOF__"
          } >> $GITHUB_OUTPUT

      - name: Upload sensor report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sensor-report
          path: sensor_report.txt
          if-no-files-found: ignore

      - name: Post failure summary as PR comment
        if: github.event_name == 'pull_request' && steps.check_agent.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('sensor_report.txt', 'utf8');
            const lines = report.split('\n').filter(l => l.length);
            const failures = lines.filter(l => l.startsWith('['));
            const skipped = lines.filter(l => l.startsWith('# skipped'));
            const errors = lines.filter(l => l.startsWith('# runtime'));
            const trimmed = report.length > 60000
              ? report.slice(0, 60000) + '\n…(truncated, see workflow artifact `sensor-report`)…'
              : report;
            const body = [
              '## Sensor stack — failures detected',
              '',
              `**Failures:** ${failures.length / 2}  •  **Skipped tools:** ${skipped.length}  •  **Runtime errors:** ${errors.length}`,
              '',
              '<details><summary>Full report</summary>',
              '',
              '```',
              trimmed,
              '```',
              '',
              '</details>',
              '',
              `_Run \`make check\` locally to reproduce, or \`make check-agent\` for the same agent-formatted output. Workflow run: ${context.payload.pull_request.html_url}/checks?check_run_id=${context.runId}._`,
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const marker = '## Sensor stack — failures detected';
            const existing = comments.find(c => c.user.login === 'github-actions[bot]' && c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail the workflow if sensors flagged anything
        if: steps.check_agent.outputs.exit_code != '0'
        run: |
          echo "::error::Sensor stack reported failures — see job log and PR comment."
          exit 1
