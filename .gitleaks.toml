# DEATHSTAR sensor stack вЂ” gitleaks config.
#
# Scans for secrets specific to this project: JWT tokens, Fernet keys,
# API tokens, admin password literals.
#
# Note on `useDefault`: disabled. The default gitleaks rule pack (AWS, GCP,
# generic-api-key, private-key, github-pat, ...) produced too many false
# positives in cc_prompts/* and tests/test_sanitizer*.py вЂ” those files
# contain SAMPLE tokens used to demonstrate redaction behaviour. Custom
# rules below cover the actual secret formats this codebase produces.
# To re-enable defaults, set `useDefault = true` and ensure the global
# allowlist below covers the new findings.

title = "DEATHSTAR gitleaks rules"

[extend]
useDefault = false

# в”Ђв”Ђ Custom rules в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Each rule has a per-rule allowlist as a safety net in case the global
# allowlist below isn't honoured by future gitleaks versions.

[[rules]]
id = "deathstar-jwt-token"
description = "JWT token (header.payload.signature, base64url segments)"
regex = '''eyJ[A-Za-z0-9_-]{10,}\.eyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}'''
tags = ["jwt", "auth"]
[[rules.allowlists]]
paths = [
    '''(^|/)tests/''',
    '''(^|/)cc_prompts/''',
    '''(^|/)OptionsModal\.jsx$''',
]

[[rules]]
id = "deathstar-fernet-key"
description = "Fernet symmetric encryption key (44-char urlsafe base64 ending '=')"
regex = '''(?i)(SETTINGS_ENCRYPTION_KEY|FERNET_KEY)\s*[:=]\s*['"]?[A-Za-z0-9_-]{43}=['"]?'''
tags = ["secret", "fernet", "encryption"]
[[rules.allowlists]]
paths = [
    '''(^|/)tests/''',
    '''(^|/)cc_prompts/''',
    '''\.example$''',
    '''(^|/)\.env\.defaults$''',
]

[[rules]]
id = "deathstar-api-token-assignment"
description = "Generic API/auth token literal assignment"
regex = '''(?i)(api[_-]?token|auth[_-]?token|access[_-]?token|bearer[_-]?token)\s*[:=]\s*['"][A-Za-z0-9_\-\.=]{24,}['"]'''
tags = ["secret", "api-token"]
[[rules.allowlists]]
regexes = ['''\$\{?[A-Z_][A-Z0-9_]+\}?''', '''os\.environ''', '''getenv''']
paths = [
    '''(^|/)tests/''',
    '''(^|/)cc_prompts/''',
    '''\.example$''',
]

[[rules]]
id = "deathstar-admin-password-literal"
description = "Hardcoded admin password literal"
regex = '''(?i)ADMIN_PASSWORD\s*=\s*['"][A-Za-z0-9_!@#$%^&*()-]{8,}['"]'''
tags = ["secret", "password"]
[[rules.allowlists]]
paths = [
    '''(^|/)tests/''',
    '''(^|/)cc_prompts/''',
    '''\.example$''',
    '''(^|/)\.env\.defaults$''',
]

# в”Ђв”Ђ Global allowlist вЂ” secondary filter, applies to any rule findings в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

[allowlist]
description = "Repo-wide path and pattern skips"
paths = [
    '''(^|/)tests/''',
    '''/__tests__/''',
    '''\.example$''',
    '''\.example\.''',
    '''(^|/)\.env\.defaults$''',
    '''(^|/)package-lock\.json$''',
    '''(^|/)pnpm-lock\.yaml$''',
    '''(^|/)yarn\.lock$''',
    '''(^|/)node_modules/''',
    '''(^|/)dist/''',
    '''(^|/)build/''',
    '''\.min\.js$''',
    '''\.svg$''',
    '''(^|/)cc_prompts/''',
    '''(^|/)data/''',
    '''(^|/)logs/''',
    '''(^|/)\.code-index/''',
    '''(^|/)\.pytest_cache/''',
    '''(^|/)OptionsModal\.jsx$''',
]
regexes = [
    '''(?i)(your[_-]?key[_-]?here|placeholder|example|dummy|fake|test[_-]?token|\bxxx+\b)''',
    '''-----BEGIN [A-Z ]+PRIVATE KEY-----''',
]
