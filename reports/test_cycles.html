// ============================================================
//   STATE
// ============================================================
const LS_KEY = "deathstar_cycles_v1";

function loadState() {
  try { return JSON.parse(localStorage.getItem(LS_KEY) || "{}"); }
  catch { return {}; }
}
function saveState(s) { localStorage.setItem(LS_KEY, JSON.stringify(s)); }

let state = loadState();
let currentIdx = parseInt(location.hash.replace("#cycle-", "")) || 0;
if (isNaN(currentIdx) || currentIdx < 0 || currentIdx > CYCLES.length) currentIdx = 0;

function getCycleState(id) {
  if (!state[id]) state[id] = { status: "planned", notes: {}, results: "" };
  return state[id];
}

// ============================================================
//   RENDER
// ============================================================
function renderSidebar() {
  const el = document.getElementById("sidebar");
  let html = '<div class="side-title">CYCLE INDEX</div>';
  // overview link
  html += `<div class="cycle-item ${currentIdx === -1 ? 'active' : ''}" onclick="goTo(-1)">
    <span class="num">◢</span>
    <span class="name">Overview</span>
  </div>`;
  CYCLES.forEach((c, i) => {
    const st = getCycleState(c.id).status;
    html += `<div class="cycle-item ${currentIdx === i ? 'active' : ''}" data-status="${st}" onclick="goTo(${i})">
      <span class="num">${String(c.id).padStart(2,'0')}</span>
      <div style="flex:1;">
        <div class="name">${c.title}</div>
        <div style="font-family:var(--font-mono);font-size:9px;color:var(--text-3);letter-spacing:0.1em;margin-top:2px;">${c.version} · ${c.area}</div>
      </div>
      <span class="status-dot"></span>
    </div>`;
  });
  el.innerHTML = html;
}

function renderMain() {
  if (currentIdx === -1) { renderOverview(); return; }
  const c = CYCLES[currentIdx];
  if (!c) { currentIdx = 0; renderMain(); return; }
  const st = getCycleState(c.id);
  const badgesHtml = (c.badges || []).map(b => `<span class="badge ${b}">${b.toUpperCase()}</span>`).join('');

  const html = `
    <div class="page-head">
      <span class="pill">CYCLE ${String(c.id).padStart(2,'0')} · ${c.version}</span>
      <h2>${c.title}</h2>
      <span class="tag">${badgesHtml}</span>
    </div>
    <div class="subhead">
      <span class="ver">${c.version}</span>
      &nbsp;·&nbsp;
      <span class="area">${c.area}</span>
      &nbsp;·&nbsp;
      ${c.subhead}
    </div>

    <div class="status-bar">
      ${["planned","testing","fix-shipped","verified","failed"].map(s => `
        <button class="status-btn ${s} ${st.status === s ? 'active' : ''}" onclick="setStatus('${c.id}','${s}')">${s.replace('-', ' ')}</button>
      `).join('')}
    </div>

    <div class="cols">
      <!-- discovered -->
      <div class="col discovered">
        <div class="col-title">◤ DISCOVERED — PRE-FIX</div>
        <div class="block">
          <div class="lbl">Hypothesis</div>
          <div class="val">${(c.discovered.hypothesis || []).map(h => '• ' + h).join('\n')}</div>
        </div>
        <div class="block">
          <div class="lbl">Test plan</div>
          <div class="val mono">${escapeHtml(c.discovered.test_plan || '')}</div>
        </div>
        <div class="block">
          <div class="lbl">Actual findings (fill in during run)</div>
          <textarea class="editable" placeholder="paste raw tool counts, outputs, bug notes..."
            oninput="saveNote('${c.id}','discovered',this.value)">${escapeHtml(st.notes.discovered || '')}</textarea>
        </div>
      </div>

      <!-- planned -->
      <div class="col planned">
        <div class="col-title">◆ PLANNED FIX</div>
        <div class="block">
          <div class="lbl">CC prompt</div>
          <div class="val mono">${c.planned.prompt}</div>
        </div>
        <div class="block">
          <div class="lbl">Summary</div>
          <div class="val">${escapeHtml(c.planned.summary)}</div>
        </div>
        ${c.planned.scope && c.planned.scope.length ? `
        <div class="block">
          <div class="lbl">Scope (files)</div>
          <div class="val mono">${c.planned.scope.map(s => '• ' + escapeHtml(s)).join('\n')}</div>
        </div>` : ''}
        ${c.planned.code_preview ? `
        <div class="block">
          <div class="lbl">Code preview</div>
          <div class="code">${escapeHtml(c.planned.code_preview)}</div>
        </div>` : ''}
        <div class="block">
          <div class="lbl">Shipped (paste git hash once CC has pushed)</div>
          <input type="text" class="editable" style="min-height:auto;height:32px;"
            placeholder="e.g. d1449e4"
            value="${escapeHtml(st.notes.git_hash || '')}"
            oninput="saveNote('${c.id}','git_hash',this.value)" />
        </div>
      </div>

      <!-- verify -->
      <div class="col verified">
        <div class="col-title">◇ POST-FIX VERIFY</div>
        <div class="block">
          <div class="lbl">Verification plan</div>
          <div class="val mono">${escapeHtml(c.verify.plan || '')}</div>
        </div>
        <div class="block">
          <div class="lbl">Verification results (fill in after fix)</div>
          <textarea class="editable" placeholder="paste tool counts post-fix, whether PASS criteria met, any regressions..."
            oninput="saveNote('${c.id}','verify',this.value)">${escapeHtml(st.notes.verify || '')}</textarea>
        </div>
        ${c.verify.git_hashes ? `
        <div class="block">
          <div class="lbl">Reference hashes</div>
          <div class="val mono">${escapeHtml(c.verify.git_hashes)}</div>
        </div>` : ''}
      </div>
    </div>

    <div class="page-nav">
      <button onclick="prev()" ${currentIdx === 0 ? 'disabled' : ''}>◁  PREV</button>
      <span class="progress">${String(currentIdx + 1).padStart(2,'0')} / ${CYCLES.length}</span>
      <button onclick="next()" ${currentIdx === CYCLES.length - 1 ? 'disabled' : ''}>NEXT  ▷</button>
    </div>
  `;
  document.getElementById("main").innerHTML = html;
}

function renderOverview() {
  const cards = CYCLES.map((c, i) => {
    const st = getCycleState(c.id);
    const badgesHtml = (c.badges || []).map(b => `<span class="badge ${b}">${b.toUpperCase()}</span>`).join('');
    return `
      <div class="overview-card" data-status="${st.status}" onclick="goTo(${i})">
        <div class="oc-top">
          <span>${c.version} · CYCLE ${String(c.id).padStart(2,'0')}</span>
          <span>${st.status.toUpperCase()}</span>
        </div>
        <div class="oc-title">${c.title}</div>
        <div class="oc-tag">${c.area} ${badgesHtml}</div>
      </div>
    `;
  }).join('');
  document.getElementById("main").innerHTML = `
    <div class="page-head">
      <span class="pill">OVERVIEW</span>
      <h2>Test → Fix → Verify · 11 cycles</h2>
    </div>
    <div class="subhead">Click any card to open that cycle. Status and notes are saved in your browser (localStorage).</div>
    <div class="overview-grid">${cards}</div>
    <div class="page-nav">
      <span class="progress">use sidebar or click a card</span>
      <button onclick="goTo(0)">START ▷</button>
    </div>
  `;
}

// ============================================================
//   ACTIONS
// ============================================================
function goTo(i) {
  currentIdx = i;
  location.hash = i === -1 ? "" : "#cycle-" + i;
  renderSidebar(); renderMain();
  updateStats();
  window.scrollTo(0, 0);
}
function next() { if (currentIdx < CYCLES.length - 1) goTo(currentIdx + 1); }
function prev() { if (currentIdx > 0) goTo(currentIdx - 1); }

function setStatus(id, status) {
  getCycleState(id).status = status;
  saveState(state);
  renderSidebar(); renderMain();
  updateStats();
}

function saveNote(id, key, value) {
  const s = getCycleState(id);
  if (key === "git_hash") s.notes.git_hash = value;
  else s.notes[key] = value;
  saveState(state);
}

function resetAll() {
  if (!confirm("Clear all progress and notes? This cannot be undone.")) return;
  localStorage.removeItem(LS_KEY);
  state = {};
  renderSidebar(); renderMain(); updateStats();
}

function updateStats() {
  let v = 0, w = 0;
  CYCLES.forEach(c => {
    const st = getCycleState(c.id).status;
    if (st === "verified") v++;
    else if (st === "testing" || st === "fix-shipped") w++;
  });
  document.getElementById("stat-total").textContent = CYCLES.length;
  document.getElementById("stat-verified").textContent = v;
  document.getElementById("stat-wip").textContent = w;
}

function escapeHtml(s) {
  if (!s) return '';
  return String(s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}

window.addEventListener("hashchange", () => {
  const h = location.hash;
  if (h === "" || h === "#") { currentIdx = -1; }
  else {
    const m = h.match(/^#cycle-(\d+)$/);
    if (m) currentIdx = parseInt(m[1]);
  }
  renderSidebar(); renderMain(); updateStats();
});

// init
renderSidebar();
renderMain();
updateStats();
</script>
</body>
</html>
